name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Only one deploy at a time — never overlap deployments
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/bondhub-api
  AZURE_RESOURCE_GROUP: bondhub-rg
  AZURE_CONTAINER_APP_NAME: bondhub-api
  AZURE_CONTAINER_APP_ENV: bondhub-env

jobs:
  # ──────────────────────────────────────────────────────────
  # Build Docker image and push to GitHub Container Registry
  # ──────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    outputs:
      short-sha: ${{ steps.sha.outputs.short }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main-${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

  # ──────────────────────────────────────────────────────────
  # Deploy new image to Azure Container Apps
  # ──────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [build-and-push]

    permissions:
      contents: read

    environment:
      name: production
      url: https://bondhub-api.azurecontainerapps.io

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${GITHUB_SHA}"

          az containerapp registry set \
            --name ${{ env.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --server ghcr.io \
            --username ${{ github.actor }} \
            --password ${{ secrets.GHCR_PAT }}

          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image "${IMAGE}"

      - name: Verify deployment health
        run: |
          sleep 30
          FQDN=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "Checking health at https://${FQDN}/api/health"
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              "https://${FQDN}/api/health" || echo "000")
            echo "Health check ${i}/12: HTTP ${HTTP_CODE}"
            if [[ "${HTTP_CODE}" == "200" ]]; then
              echo "API is healthy."
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 2 minutes."
          exit 1

  # ──────────────────────────────────────────────────────────
  # Deployment summary
  # ──────────────────────────────────────────────────────────
  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-api]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **API** | ${{ needs.deploy-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${GITHUB_SHA::8}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Web/Admin** | Deployed automatically by Vercel |" >> $GITHUB_STEP_SUMMARY
