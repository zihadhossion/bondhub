name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'Skip database migrations (use for emergency rollback only)'
        type: boolean
        default: false

# Only one deploy at a time — never overlap deployments
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/bondhub-api
  AZURE_RESOURCE_GROUP: bondhub-rg
  AZURE_CONTAINER_APP_NAME: bondhub-api
  AZURE_CONTAINER_APP_ENV: bondhub-env

jobs:
  # ──────────────────────────────────────────────────────────
  # Build Docker image and push to GitHub Container Registry
  # ──────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    outputs:
      short-sha: ${{ steps.sha.outputs.short }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main-${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

  # ──────────────────────────────────────────────────────────
  # Run TypeORM migrations as a one-shot Container Apps Job
  # before the new container revision starts
  # ──────────────────────────────────────────────────────────
  run-migrations:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ github.event.inputs.skip_migrations != 'true' }}

    permissions:
      contents: read

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run migrations via Container Apps Job
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${GITHUB_SHA}"

          # Create the migration job if it doesn't exist yet (first deploy)
          if az containerapp job show \
               --name bondhub-migrate \
               --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
               --output none 2>/dev/null; then
            echo "Migration job exists — updating image..."
            az containerapp job update \
              --name bondhub-migrate \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --image "${IMAGE}" \
              --command "[\"node\", \"apps/api/dist/database/migrate.js\"]"
          else
            echo "Migration job not found — creating..."
            az containerapp job create \
              --name bondhub-migrate \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --environment ${{ env.AZURE_CONTAINER_APP_ENV }} \
              --trigger-type Manual \
              --replica-timeout 300 \
              --replica-retry-limit 1 \
              --replica-completion-count 1 \
              --parallelism 1 \
              --image "${IMAGE}" \
              --registry-server ghcr.io \
              --registry-username ${{ github.actor }} \
              --registry-password ${{ secrets.GHCR_PAT }} \
              --cpu 0.5 \
              --memory 1Gi \
              --env-vars \
                "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
                "NODE_ENV=production" \
              --command "[\"node\", \"apps/api/dist/database/migrate.js\"]"
          fi

          # Start the migration job
          EXECUTION_NAME=$(az containerapp job start \
            --name bondhub-migrate \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query name -o tsv)

          echo "Migration job execution: ${EXECUTION_NAME}"

          # Poll until done (max 5 minutes)
          for i in $(seq 1 30); do
            STATUS=$(az containerapp job execution show \
              --name bondhub-migrate \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --job-execution-name "${EXECUTION_NAME}" \
              --query "properties.status" -o tsv 2>/dev/null || echo "Running")
            echo "Migration status: ${STATUS} (attempt ${i}/30)"
            if [[ "${STATUS}" == "Succeeded" ]]; then
              echo "Migrations completed successfully."
              exit 0
            elif [[ "${STATUS}" == "Failed" || "${STATUS}" == "Stopped" ]]; then
              echo "Migration job failed with status: ${STATUS}"
              exit 1
            fi
            sleep 10
          done
          echo "Migration job timed out after 5 minutes."
          exit 1

  # ──────────────────────────────────────────────────────────
  # Deploy new image to Azure Container Apps
  # ──────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [build-and-push, run-migrations]

    permissions:
      contents: read

    environment:
      name: production
      url: https://bondhub-api.azurecontainerapps.io

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${GITHUB_SHA}"

          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image "${IMAGE}" \
            --registry-server ghcr.io \
            --registry-username ${{ github.actor }} \
            --registry-password ${{ secrets.GHCR_PAT }}

      - name: Verify deployment health
        run: |
          sleep 30
          FQDN=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "Checking health at https://${FQDN}/api/health"
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              "https://${FQDN}/api/health" || echo "000")
            echo "Health check ${i}/12: HTTP ${HTTP_CODE}"
            if [[ "${HTTP_CODE}" == "200" ]]; then
              echo "API is healthy."
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 2 minutes."
          exit 1

  # ──────────────────────────────────────────────────────────
  # Deployment summary
  # ──────────────────────────────────────────────────────────
  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-api]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **API** | ${{ needs.deploy-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${GITHUB_SHA::8}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Web/Admin** | Deployed automatically by Vercel |" >> $GITHUB_STEP_SUMMARY
