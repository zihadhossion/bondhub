name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

# Cancel in-progress runs for the same PR to save minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ──────────────────────────────────────────────────────────
  # Detect which apps changed to skip unnecessary jobs
  # ──────────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      any: ${{ steps.filter.outputs.any }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - 'turbo.json'
            any:
              - '**'

  # ──────────────────────────────────────────────────────────
  # Lint all workspaces
  # ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint all workspaces
        run: npx turbo run lint --concurrency=4
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  # ──────────────────────────────────────────────────────────
  # Run unit tests for the API
  # ──────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx turbo run test --filter=@bondhub/api
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_dummy
          JWT_SECRET: ci-jwt-secret-not-real
          JWT_REFRESH_SECRET: ci-jwt-refresh-secret-not-real
          NODE_ENV: test
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/api/coverage/
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # Build all workspaces
  # ──────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all workspaces
        run: npx turbo run build --concurrency=4
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_dummy
          JWT_SECRET: ci-build-secret
          JWT_REFRESH_SECRET: ci-build-refresh-secret
          NODE_ENV: production
          VITE_API_URL: https://api.bondhub.example.com
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  # ──────────────────────────────────────────────────────────
  # Validate Dockerfile builds (no push)
  # ──────────────────────────────────────────────────────────
  docker-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          load: true
          tags: bondhub-api:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────
  # Gate job — add this to branch protection rules
  # ──────────────────────────────────────────────────────────
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, build, docker-check]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || \
                "${{ needs.build.result }}" == "failure" || \
                "${{ needs.docker-check.result }}" == "failure" ]]; then
            echo "One or more required CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
